name: Generate Snake Animation

on:
  # run every 12 hours
  schedule:
    - cron: "0 */12 * * *"
  # allow manual run from the Actions tab
  workflow_dispatch:
  # regenerate on push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake-gen
        with:
          github_user_name: ${{ github.repository_owner }}
          # dark = teal snake on navy->lilac->teal trail
          # light = purple snake on lilac->teal->navy trail
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%2366C8C9&color_dots=%230d1117,%231f3550,%235E2099,%23B79BE0,%2366C8C9
            dist/github-snake.svg?palette=github-light&color_snake=%235E2099&color_dots=%23ebedf0,%23B79BE0,%23359F9C,%235E2099,%23081A30

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
